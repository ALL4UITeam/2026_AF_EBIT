<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>콘텐츠 관리 | E-BIT 관리자</title>
  {{> meta}}
</head>

<body class="al-admin">
  <div class="al-wrap">

    {{> header }}

    <div class="al-body">
      <div class="al-backdrop" id="alBackdrop" aria-hidden="true"></div>

      {{> nav }}
      <main class="al-content" id="alContent">
        <section class="card">
          <h3 class="card__title">콘텐츠 관리 Modal</h3>
          <div class="al-guide-row">
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-content-setting-customer">텍스트 설정 등록 - 고객사 선택</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-content-setting-txt">텍스트 설정 등록 - 텍스트 선택</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-content-setting-station">텍스트 설정 등록 - 정류장 선택</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-content-station-text-regist">정류장 텍스트 설정 등록</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-content-station-text-detail">정류장 텍스트 설정 상세</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-content-text-regist">텍스트 등록</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-content-text-detail">텍스트 상세</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-warning-1">경고(오류)</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-warning-2">경고(OTP초기화)</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-confirm">확인</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-modify">수정</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-regist">등록</button>
          </div>
        </section>

        {{>modal-content }}
        {{>modal-common-alerts }}

      </main>
      <!-- // al-content -->
    </div>
  </div>




  <script type="module" src="./js/page/index.js"></script>
</body>

</html>
