<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>앱 관리 | E-BIT 관리자</title>
  {{> meta}}
</head>

<body class="al-admin">
  <div class="al-wrap">

    {{> header }}

    <div class="al-body">
      <div class="al-backdrop" id="alBackdrop" aria-hidden="true"></div>

      {{> nav }}
      <main class="al-content" id="alContent">
        <section class="card">
          <h3 class="card__title">앱 관리Modal</h3>
          <div class="al-guide-row">
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-app-detail">앱 상세</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-app-regist">앱 등록</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-deploy-detail">배포 상세</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-deploy-app-select">배포 등록 - 앱 선택</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-deploy-device-select">배포 등록 - 배포 장치 선택</button>
            <button type="button" class="btn btn--primary btn--md" data-al-modal-open="al-modal-deploy-type-select">배포 등록 - 배포 유형 선택</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-warning-1">경고(오류)</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-warning-2">경고(OTP초기화)</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-confirm">확인</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-modify">수정</button>
            <button type="button" class="btn btn--secondary btn--md" data-al-modal-open="al-modal-regist">등록</button>
          </div>
        </section>

        {{>modal-app }}
        {{>modal-common-alerts }}

      </main>
      <!-- // al-content -->
    </div>
  </div>




  <script type="module" src="./js/page/index.js"></script>
</body>

</html>
