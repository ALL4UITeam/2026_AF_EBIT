<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-bit 관리자</title>
    {{> meta}}
</head>

<body class="login-page">

    <main class="login-page__wrap">
        <div class="login-page__content">
            <div class="login-page__visual" aria-hidden="true">
                <img src="./assets/images/login/login-bg.png" alt="">
            </div>

            <div class="login-page__auth">
                <div class="login-page__brand">
                    <img src="./assets/images/login/logo.svg" alt="E-BIT" class="login-page__logo">
                    <p class="login-page__brand-text">BIS 단말 통합 관리 시스템</p>
                </div>

                <section class="login-card login-card--complete" aria-labelledby="loginTitle">
                    <h1 class="login-card__title" id="loginTitle">비밀번호 변경 완료</h1>
                    <p class="login-card__subtitle login-card__subtitle--plain">비밀번호가 성공적으로 변경되었습니다.</p>

                    <a href="./00_로그인.html" class="login-card__submit login-card__submit--link">로그인하러 가기</a>
                </section>

                <p class="login-page__copyright">&copy; 2026 E-BIT. All rights reserved.</p>
            </div>
        </div>
    </main>

</body>

</html>
